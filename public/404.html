<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>JW Plots</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var basePath = location.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/');
        var redirect =
          basePath +
          '/?/' +
          location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
          (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash;

        sessionStorage.setItem('gh-pages-redirect', redirect);
        location.replace(basePath + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
