name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write production environment
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          DEFAULT_CITY: ${{ vars.DEFAULT_CITY || 'Kropyvnytskyi' }}
          DEFAULT_MAP_LAT: ${{ vars.DEFAULT_MAP_LAT || '48.5079' }}
          DEFAULT_MAP_LNG: ${{ vars.DEFAULT_MAP_LNG || '32.2623' }}
          CURRENT_USER: ${{ vars.CURRENT_USER || 'Field User' }}
        run: |
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            googleMapsApiKey: '${GOOGLE_MAPS_API_KEY}',
            defaultCity: '${DEFAULT_CITY}',
            defaultMapCenter: {
              lat: ${DEFAULT_MAP_LAT},
              lng: ${DEFAULT_MAP_LNG}
            },
            currentUser: '${CURRENT_USER}'
          } as const;
          EOF

      - name: Build app
        run: npm run build:gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/jw-plots/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
